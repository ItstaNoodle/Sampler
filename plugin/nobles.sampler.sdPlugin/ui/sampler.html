<!doctype html><html><head><meta charset="utf-8"><title>Sampler Settings</title><style>body{font-family:Arial;color:#ddd;background:#2d2d2d;margin:12px}label{display:block;margin:10px 0 4px}input,select{width:100%;box-sizing:border-box;background:#444;color:white;border:1px solid #666;padding:7px}.hint{font-size:11px;color:#aaa;margin-top:4px}.error{color:#ff8d8d}</style></head>
<body>
<label>Capture source</label><select id="captureDeviceId"><option value="">Windows default output</option></select>
<label>Playback destination</label><select id="playbackDeviceId"><option value="">Windows default output</option></select>
<div id="audioStatus" class="hint">Loading audio devices…</div>
<hr>
<label>Slot (1-32)</label><input id="slot" type="number" min="1" max="32" value="1">
<label>Button label</label><input id="label" type="text" placeholder="Slot name">
<label>Previous audio seconds (0-15)</label><input id="bufferSeconds" type="number" min="0" max="15" value="5">
<label>Hold delay in milliseconds</label><input id="holdMilliseconds" type="number" min="200" max="2000" value="400">
<label>Playback volume (0-2)</label><input id="volume" type="number" min="0" max="2" step="0.05" value="1">
<script>
let ws, uuid, actionInfo;
function connectElgatoStreamDeckSocket(port, propertyInspectorUUID, registerEvent, info, actionInfoJson){
 uuid=propertyInspectorUUID; actionInfo=JSON.parse(actionInfoJson); ws=new WebSocket('ws://127.0.0.1:'+port);
 ws.onopen=()=>{ws.send(JSON.stringify({event:registerEvent,uuid})); const s=actionInfo.payload.settings||{}; for(const id of ['slot','label','bufferSeconds','holdMilliseconds','volume']) if(s[id]!==undefined) document.getElementById(id).value=s[id]; loadAudioDevices();};
 for(const id of ['slot','label','bufferSeconds','holdMilliseconds','volume']) document.getElementById(id).addEventListener('change',save);
}
function save(){const settings={slot:Number(slot.value),label:label.value,bufferSeconds:Number(bufferSeconds.value),holdMilliseconds:Number(holdMilliseconds.value),volume:Number(volume.value)};ws.send(JSON.stringify({event:'setSettings',context:uuid,payload:settings}));}
async function loadAudioDevices(){try{const [devicesResponse,settingsResponse]=await Promise.all([fetch('http://127.0.0.1:17891/api/audio/devices'),fetch('http://127.0.0.1:17891/api/audio/settings')]);if(!devicesResponse.ok||!settingsResponse.ok)throw new Error('Audio service unavailable');const devices=await devicesResponse.json(),settings=await settingsResponse.json();for(const select of [captureDeviceId,playbackDeviceId])for(const device of devices){const option=document.createElement('option');option.value=device.id;option.textContent=device.name+(device.isDefault?' (Default)':'');select.appendChild(option);}captureDeviceId.value=settings.captureDeviceId||'';playbackDeviceId.value=settings.playbackDeviceId||'';audioStatus.textContent='Audio source settings apply to every sampler slot.';}catch(error){audioStatus.textContent=String(error);audioStatus.classList.add('error');}}
async function saveAudio(){audioStatus.textContent='Saving…';audioStatus.classList.remove('error');try{const response=await fetch('http://127.0.0.1:17891/api/audio/settings',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({captureDeviceId:captureDeviceId.value||null,playbackDeviceId:playbackDeviceId.value||null})});if(!response.ok)throw new Error(await response.text());audioStatus.textContent='Audio devices saved.';}catch(error){audioStatus.textContent=String(error);audioStatus.classList.add('error');}}
captureDeviceId.addEventListener('change',saveAudio);playbackDeviceId.addEventListener('change',saveAudio);
</script></body></html>
