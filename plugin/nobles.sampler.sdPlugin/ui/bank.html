<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:Arial;color:#ddd;background:#2d2d2d;margin:12px}label{display:block;margin:10px 0 4px}select{width:100%;padding:7px;background:#444;color:#fff}</style></head><body>
<label>Bank button behavior</label><select id="mode"><option value="next">Next bank</option><option value="previous">Previous bank</option><option value="1">Select Bank 1</option><option value="2">Select Bank 2</option><option value="3">Select Bank 3</option><option value="4">Select Bank 4</option></select>
<script>let ws,uuid,settings={};function connectElgatoStreamDeckSocket(port,pid,registerEvent,info,actionInfoJson){uuid=pid;const ai=JSON.parse(actionInfoJson);settings=ai.payload.settings||{};ws=new WebSocket('ws://127.0.0.1:'+port);ws.onopen=()=>{ws.send(JSON.stringify({event:registerEvent,uuid}));mode.value=settings.bank?String(settings.bank):(settings.direction||'next');};mode.onchange=()=>{const v=mode.value;settings=v==='next'||v==='previous'?{direction:v}:{bank:Number(v)};ws.send(JSON.stringify({event:'setSettings',context:uuid,payload:settings}));};}</script></body></html>
